services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres-dataviz
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: robot
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./shared/postgres:/shared:ro
      - ./data:/data:ro


  adminer:
    image: adminer:4
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      - postgres

  notebook:
    build:
      context: ./notebook
    container_name: notebook-dataviz
    environment:
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-sql-nosql}
    ports:
      - "${NOTEBOOK_PORT:-8889}:8888"
    volumes:
      - ../:/home/jovyan/work
    working_dir: /home/jovyan/work

volumes:
  postgres_data:

networks:
  shared_network:
